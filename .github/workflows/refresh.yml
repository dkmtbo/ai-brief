name: Refresh AI Brief

on:
  schedule:
    # 17:00 UTC = 12:00 noon in Houston during Central Daylight Time (Mar-Nov).
    # In winter (CST) this runs at 11:00 a.m.; change to "0 18 * * *" for noon.
    - cron: "0 17 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-ai-brief
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build the page
        run: python build.py

      - name: Commit if changed
        run: |
          git config user.name "ai-brief-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes today."
          else
            git commit -m "Daily refresh: $(date -u +'%Y-%m-%d')"
            git push
          fi
